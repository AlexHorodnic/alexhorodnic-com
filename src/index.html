<!doctype html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="utf-8">
  <title>Alex Horodnic | Frontend Developer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Frontend Developer portfolio for Alex Horodnic, focused on Angular, TypeScript, responsive UI, API integration, and maintainable product interfaces."
  >
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
  <script>
    (() => {
      const storageKey = 'portfolio-theme';
      const root = document.documentElement;
      const savedTheme = localStorage.getItem(storageKey);
      const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';

      root.classList.remove('theme-dark', 'theme-light');
      root.classList.add(`theme-${theme}`);
      root.style.colorScheme = theme;
    })();
  </script>
  <style>
    :root {
      background: #080a0f;
      color: #f4f7fb;
      color-scheme: dark;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root.theme-light {
      background: #f8fafc;
      color: #111827;
      color-scheme: light;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: inherit;
      color: inherit;
      font-family: inherit;
    }

    body {
      min-width: 320px;
    }

    a {
      color: inherit;
      text-decoration-color: currentColor;
    }

    app-root {
      display: block;
      min-height: 100vh;
      background: inherit;
    }

    .initial-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 36%, rgba(125, 211, 199, 0.12), transparent 24rem),
        #080a0f;
      color: #f4f7fb;
      transition:
        opacity 220ms ease,
        visibility 220ms ease;
    }

    :root.theme-light .initial-loader {
      background:
        radial-gradient(circle at 50% 36%, rgba(23, 109, 102, 0.12), transparent 24rem),
        #f8fafc;
      color: #111827;
    }

    .initial-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .initial-loader__brand {
      display: grid;
      gap: 10px;
      text-align: center;
      animation: initial-loader-pulse 1.4s ease-in-out infinite alternate;
    }

    .initial-loader__name {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .initial-loader__role {
      color: #b9f3ea;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    :root.theme-light .initial-loader__role {
      color: #0f5e58;
    }

    @keyframes initial-loader-pulse {
      from {
        opacity: 0.72;
        transform: translateY(2px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="initial-loader" id="initial-loader" aria-label="Loading portfolio">
    <div class="initial-loader__brand">
      <strong class="initial-loader__name">Alex Horodnic</strong>
      <span class="initial-loader__role">Frontend Developer</span>
    </div>
  </div>
  <app-root></app-root>
</body>
</html>
