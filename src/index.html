<!doctype html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="utf-8">
  <title>Alex Horodnic | Frontend Developer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Frontend Developer portfolio for Alex Horodnic, focused on Angular, TypeScript, responsive UI, API integration, and maintainable product interfaces."
  >
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
  <script>
    (() => {
      const storageKey = 'portfolio-theme';
      const root = document.documentElement;
      const savedTheme = localStorage.getItem(storageKey);
      const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';

      root.classList.remove('theme-dark', 'theme-light');
      root.classList.add(`theme-${theme}`);
      root.style.colorScheme = theme;
    })();
  </script>
  <style>
    :root {
      background: #080a0f;
      color: #f4f7fb;
      color-scheme: dark;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root.theme-light {
      background: #f8fafc;
      color: #111827;
      color-scheme: light;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: inherit;
      color: inherit;
      font-family: inherit;
    }

    body {
      min-width: 320px;
    }

    a {
      color: inherit;
      text-decoration-color: currentColor;
    }

    app-root {
      display: block;
      min-height: 100vh;
      background: inherit;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 180ms ease,
        visibility 180ms ease;
    }

    :root.app-ready app-root {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
