<section class="section" id="services" aria-labelledby="services-title">
  <app-section-header eyebrow="Services" title="What I can help with." titleId="services-title" [compact]="true" />

  <div class="service-grid">
    @for (service of portfolio.services; track service.title) {
      <article class="service-card">
        <div class="service-title">
          <span class="service-icon" aria-hidden="true">
            @switch (service.icon) {
              @case ('tool') {
                <svg class="icon" viewBox="0 0 24 24"><path d="m14.7 6.3 3 3" /><path d="M4 20 14.7 9.3" /><path d="M16 4a4 4 0 0 0 4 4l-3.5 3.5-4-4L16 4Z" /></svg>
              }
              @case ('layout') {
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2" /><path d="M3 9h18" /><path d="M9 20V9" /></svg>
              }
              @case ('code') {
                <svg class="icon" viewBox="0 0 24 24"><path d="m8 9-4 3 4 3" /><path d="m16 9 4 3-4 3" /><path d="m14 5-4 14" /></svg>
              }
              @case ('ui') {
                <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2" /><path d="M8 9h8" /><path d="M8 13h4" /><path d="M15 13h1" /></svg>
              }
              @case ('speed') {
                <svg class="icon" viewBox="0 0 24 24"><path d="M5 19a8 8 0 1 1 14 0" /><path d="m13 13 4-4" /><path d="M12 19h.01" /></svg>
              }
              @case ('agency') {
                <svg class="icon" viewBox="0 0 24 24"><path d="M4 20V8l8-4 8 4v12" /><path d="M9 20v-6h6v6" /><path d="M8 10h.01" /><path d="M16 10h.01" /></svg>
              }
            }
          </span>
          <h3>{{ service.title }}</h3>
        </div>
        <p>{{ service.description }}</p>
      </article>
    }
  </div>
</section>
