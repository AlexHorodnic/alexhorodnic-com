<section class="section section-grid" id="experience" aria-labelledby="experience-title">
  <app-section-header eyebrow="Experience" title="Business-focused delivery." titleId="experience-title" />

  <div class="timeline">
    @for (item of portfolio.experience; track item.company + item.role) {
      <article class="timeline-item">
        <div class="timeline-meta">
          <span>{{ item.dates }}</span>
          <span>{{ item.location }}</span>
        </div>
        <div class="timeline-card">
          <p class="company">{{ item.company }}</p>
          <h3>{{ item.role }}</h3>
          <ul class="check-list">
            @for (achievement of item.achievements; track achievement) {
              <li>{{ achievement }}</li>
            }
          </ul>
        </div>
      </article>
    }
  </div>
</section>
