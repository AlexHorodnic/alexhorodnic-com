<nav class="topbar" [class.is-scrolled]="navigationService.isScrolled()" aria-label="Primary navigation">
  <a class="brand" href="/" aria-label="Back to top" (click)="scrollToSection($event, 'top')">
    <img src="/favicon.svg" alt="" width="40" height="40" />
  </a>

  <div
    class="nav-links"
    id="primary-navigation"
    [class.is-open]="isNavigationOpen()"
    aria-label="Page sections"
  >
    @for (item of navItems; track item.id) {
      <a
        href="/"
        [class.is-active]="navigationService.activeSection() === item.id"
        [attr.aria-current]="navigationService.activeSection() === item.id ? 'page' : null"
        (click)="scrollToSection($event, item.id)"
        >{{ item.label }}</a
      >
    }
  </div>

  <button
    class="nav-toggle"
    type="button"
    aria-label="Toggle navigation menu"
    aria-controls="primary-navigation"
    [attr.aria-expanded]="isNavigationOpen()"
    (click)="toggleNavigation()"
  >
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
  </button>

  <button
    class="theme-toggle"
    type="button"
    [attr.aria-label]="
      themeService.currentTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
    "
    [attr.title]="themeService.currentTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    (click)="themeService.toggleTheme()"
  >
    @if (themeService.currentTheme() === 'dark') {
      <svg class="theme-icon" aria-hidden="true" viewBox="0 0 24 24">
        <path d="M20.5 14.4A7.8 7.8 0 0 1 9.6 3.5 8.4 8.4 0 1 0 20.5 14.4Z" />
      </svg>
    } @else {
      <svg class="theme-icon" aria-hidden="true" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4.2" />
        <path d="M12 2.8v2" />
        <path d="M12 19.2v2" />
        <path d="m4.7 4.7 1.4 1.4" />
        <path d="m17.9 17.9 1.4 1.4" />
        <path d="M2.8 12h2" />
        <path d="M19.2 12h2" />
        <path d="m4.7 19.3 1.4-1.4" />
        <path d="m17.9 6.1 1.4-1.4" />
      </svg>
    }
  </button>
</nav>
